# =============================================================================
# SecureDx AI — Docker Compose Base Configuration
# =============================================================================
# This is the base config shared by dev and prod overrides.
# Do NOT use this file directly. Use:
#   Development:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#   Shortcut:     make dev-up / make prod-up
# =============================================================================

x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  CLINIC_ID: ${CLINIC_ID}
  CLINIC_NAME: ${CLINIC_NAME}

x-api-env: &api-env
  <<: *common-env
  SECRET_KEY: ${SECRET_KEY}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: 5432
  DB_NAME: ${DB_NAME:-securedx}
  DB_USER: ${DB_USER:-securedx_app}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
  KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
  KEYCLOAK_REALM: ${KEYCLOAK_REALM:-securedx}
  KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-securedx-api}
  KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
  INFERENCE_SERVICE_URL: ${INFERENCE_SERVICE_URL:-http://inference:8001}
  INFERENCE_TIMEOUT_SECONDS: ${INFERENCE_TIMEOUT_SECONDS:-10}
  DIAGNOSIS_CONFIDENCE_THRESHOLD: ${DIAGNOSIS_CONFIDENCE_THRESHOLD:-0.70}
  AUDIT_LOG_DIR: /var/log/securedx/audit
  AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-2190}
  DEIDENTIFICATION_METHOD: ${DEIDENTIFICATION_METHOD:-safe_harbor}
  PSEUDONYM_SALT: ${PSEUDONYM_SALT}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Encrypted clinical data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    #container_name: securedx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-securedx}
      POSTGRES_USER: ${DB_USER:-securedx_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-securedx_app} -d ${DB_NAME:-securedx}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - securedx-internal

  # ---------------------------------------------------------------------------
  # Keycloak 23 — RBAC / OIDC Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: securedx-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-securedx}
      KC_DB_USERNAME: ${DB_USER:-securedx_app}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"               #CODEX Keycloak 23+ has a /health endpoint we can use for better health check reliability
    volumes:
      - ./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Use bash explicitly because /dev/tcp is a bash feature, not POSIX sh.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200' <&3"]
      #test: ["CMD-SHELL", "curl -fs http://localhost:8080/ || exit 1"]
      #test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/live HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep '200 OK'"]  
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - securedx-internal

  # ---------------------------------------------------------------------------
  # FastAPI — Core backend API
  # ---------------------------------------------------------------------------
  api:
    env_file:
      - .env
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: securedx-api
    restart: unless-stopped
    environment:
      <<: *api-env
    volumes:
      - audit_logs:/var/log/securedx/audit
    depends_on:
      postgres:
        condition: service_healthy
      keycloak: 
        condition: service_started
      inference:
        condition: service_healthy
    healthcheck:
      #test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"] 
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - securedx-internal

  # ---------------------------------------------------------------------------
  # ONNX Inference Engine — Local AI diagnostic service
  # ---------------------------------------------------------------------------
  inference:
    build:
      context: ./services/inference
      dockerfile: Dockerfile
    container_name: securedx-inference
    restart: unless-stopped
    environment:
      <<: *common-env
      MODEL_PATH: ${MODEL_PATH:-/models/securedx_v1.onnx}
      DIAGNOSIS_CONFIDENCE_THRESHOLD: ${DIAGNOSIS_CONFIDENCE_THRESHOLD:-0.70}
      MAX_DIFFERENTIALS: ${MAX_DIFFERENTIALS:-5}
    volumes:
      - model_weights:/models
    healthcheck:
      #test: ["CMD-SHELL", "curl -fs http://localhost:8001/health || exit 1"]
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - securedx-internal

  # ---------------------------------------------------------------------------
  # React Frontend — Physician / Admin / Compliance UI
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: securedx-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - securedx-internal

  # ---------------------------------------------------------------------------
  # Federated Learning Client — Background gradient sync worker
  # ---------------------------------------------------------------------------
  fl-client:
    build:
      context: ./services/fl-client
      dockerfile: Dockerfile
    container_name: securedx-fl-client
    restart: unless-stopped
    environment:
      <<: *common-env
      FL_ENABLED: ${FL_ENABLED:-true}
      FL_COORDINATOR_URL: ${FL_COORDINATOR_URL}
      FL_NODE_KEY: ${FL_NODE_KEY}
      FL_SYNC_INTERVAL_HOURS: ${FL_SYNC_INTERVAL_HOURS:-24}
      FL_MIN_LOCAL_SAMPLES: ${FL_MIN_LOCAL_SAMPLES:-50}
      DP_EPSILON: ${DP_EPSILON:-1.0}
      DP_DELTA: ${DP_DELTA:-1e-5}
      DP_CLIP_NORM: ${DP_CLIP_NORM:-1.0}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-securedx}
      DB_USER: ${DB_USER:-securedx_app}
      DB_PASSWORD: ${DB_PASSWORD}
      INFERENCE_SERVICE_URL: http://inference:8001
    volumes:
      - model_weights:/models
      - fl_queue:/var/securedx/fl-queue
    depends_on:
      postgres:
        condition: service_healthy
      inference:
        condition: service_healthy
    networks:
      - securedx-internal

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy (base; TLS added in prod override)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: securedx-nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
      - keycloak
    networks:
      - securedx-internal
      - securedx-external

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  audit_logs:
    driver: local
  model_weights:
    driver: local
  fl_queue:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  securedx-internal:
    driver: bridge
    internal: true        # No direct external access to internal services
  securedx-external:
    driver: bridge        # Only nginx is on this network
